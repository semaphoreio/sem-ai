changelog:
  exclude:
    labels:
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 📚 Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
