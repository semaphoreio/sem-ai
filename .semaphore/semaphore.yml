version: v1.0
name: sem-ai CI

agent:
  machine:
    type: e2-standard-2
    os_image: ubuntu2204

global_job_config:
  prologue:
    commands:
      - checkout
      - sem-version go 1.25.5
      - go clean -cache
      - go version

blocks:
  - name: Vet
    dependencies: []
    task:
      jobs:
        - name: go vet
          commands:
            - go vet ./...

  - name: Lint
    dependencies: []
    task:
      jobs:
        - name: golangci-lint
          commands:
            - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
            - "$(go env GOPATH)/bin/golangci-lint run ./..."

  - name: Test
    dependencies: []
    task:
      jobs:
        - name: Race + coverage
          commands:
            - go test -race -coverprofile=coverage.out ./...
            - go tool cover -func=coverage.out
            - artifact push workflow coverage.out

  - name: Build matrix
    dependencies: [Test]
    task:
      jobs:
        - name: Build darwin+linux
          matrix:
            - env_var: GOOS
              values: [darwin, linux]
            - env_var: GOARCH
              values: [amd64, arm64]
          commands:
            - export NAME="sem-ai-${GOOS}-${GOARCH}"
            - go build -o "${NAME}" ./
            - artifact push workflow "${NAME}"

        - name: Build windows-amd64
          commands:
            - export GOOS=windows
            - export GOARCH=amd64
            - go build -o sem-ai-windows-amd64.exe ./
            - artifact push workflow sem-ai-windows-amd64.exe
